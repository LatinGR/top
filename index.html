<!DOCTYPE html>

<title>Top Salsa & Bachata Charts</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
    }

    header {
        text-align: center;
        padding: 20px;
        font-size: 2rem;
        font-weight: bold;
        letter-spacing: 2px;
        background: rgba(0,0,0,0.3);
        backdrop-filter: blur(10px);
    }

    .container {
        display: flex;
        flex-wrap: wrap;
        padding: 20px;
        gap: 20px;
    }

    .column {
        flex: 1;
        min-width: 300px;
        background: rgba(255,255,255,0.05);
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        backdrop-filter: blur(12px);
    }

    .column h2 {
        text-align: center;
        margin-bottom: 20px;
        border-bottom: 2px solid rgba(255,255,255,0.2);
        padding-bottom: 10px;
    }

    .track {
        background: rgba(255,255,255,0.08);
        margin-bottom: 15px;
        padding: 10px;
        border-radius: 10px;
        transition: 0.3s;
    }

    .track:hover {
        background: rgba(255,255,255,0.15);
        transform: scale(1.02);
    }

    .track-title {
        font-weight: bold;
        margin-bottom: 5px;
    }

    audio {
        width: 100%;
        outline: none;
    }

    footer {
        text-align: center;
        padding: 15px;
        font-size: 0.9rem;
        opacity: 0.7;
    }

    @media(max-width: 768px) {
        .container {
            flex-direction: column;
        }
    }
</style>

</head>

<script>
    const players = document.querySelectorAll("audio");

    players.forEach(player => {
        player.addEventListener("play", () => {
            players.forEach(other => {
                if (other !== player) {
                    other.pause();
                }
            });
        });
    });
</script>
